<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TypeMind - 快速入驻</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#005ab4",
                        "primary-container": "#0a73e0",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#fefcff",
                        "background": "#f9f9ff",
                        "on-background": "#181c22",
                        "surface": "#f9f9ff",
                        "on-surface": "#181c22",
                        "surface-variant": "#e0e2eb",
                        "on-surface-variant": "#414753",
                        "outline": "#717785",
                        "outline-variant": "#c1c6d5",
                        "secondary-container": "#b6d0ff",
                        "on-secondary-container": "#3f5881",
                        "surface-container-low": "#f1f3fc",
                        "surface-container-lowest": "#ffffff",
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "xs": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xl": "32px",
                        "margin": "24px",
                        "gutter": "16px"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .progress-bar-glow {
            box-shadow: 0 0 8px rgba(0, 93, 184, 0.3);
        }
        .fade-enter {
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease-out;
        }
        .fade-enter-active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Top Bar -->
    <header class="bg-background w-full top-0 sticky flex justify-between items-center px-margin h-14 z-50 border-b border-outline-variant/30 transition-all" id="top-bar">
        <button onclick="goBack()" class="p-xs -ml-xs text-on-surface hover:bg-surface-container-low rounded-full transition-colors active:scale-90" aria-label="返回">
            <span class="material-symbols-outlined text-[24px]">chevron_left</span>
        </button>
        <span class="font-medium text-[14px] text-on-surface-variant" id="header-title">已知类型入驻</span>
        <div class="w-[32px]"></div> <!-- Spacer -->
    </header>

    <!-- Progress Bar (Hidden by default) -->
    <div id="progress-container" class="fixed top-14 left-0 w-full z-40 bg-background hidden">
        <div class="w-full h-[2px] bg-outline-variant">
            <div id="progress-bar" class="h-full bg-primary-container progress-bar-glow transition-all duration-300 ease-out" style="width: 0%;"></div>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="flex-grow flex flex-col px-margin pt-lg pb-32 w-full max-w-md mx-auto" id="app">
        <!-- View 1: Type Selection -->
        <div id="view-type-selection" class="flex flex-col h-full fade-enter fade-enter-active">
            <h1 class="text-[24px] font-bold text-on-surface leading-tight mb-2">选择你的类型</h1>
            <p class="text-[14px] text-on-surface-variant mb-6">如果你已经知道自己的 MBTI 类型，请在这里选择，我们将通过 5 道校准题为你建立更精准的认知功能档案。</p>
            
            <div class="grid grid-cols-4 gap-3 mb-8" id="type-grid">
                <!-- Grid items generated by JS -->
            </div>

            <div class="mt-auto pt-8">
                <button id="btn-start-calibration" class="w-full h-14 bg-surface-variant text-on-surface-variant font-medium text-[16px] rounded-xl flex items-center justify-center gap-2 transition-all opacity-50 cursor-not-allowed" disabled>
                    开始校准
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                </button>
            </div>
        </div>

        <!-- View 2: Calibration Question -->
        <div id="view-question" class="flex flex-col h-full fade-enter hidden">
            <div class="mb-8">
                <span id="q-counter" class="inline-flex items-center px-3 py-1 rounded-full bg-secondary-container/30 border border-secondary-container text-primary text-[12px] font-medium mb-4">
                    校准题 1 / 5
                </span>
                <h2 id="q-text" class="text-[22px] font-semibold text-on-surface leading-snug">
                    你在处理一个复杂的职场难题，试图找到突破口。你的思维方式更接近哪个？
                </h2>
            </div>
            
            <div class="space-y-4">
                <button onclick="selectOption('A')" class="w-full text-left flex items-start p-4 bg-surface-container-lowest border-2 border-outline-variant hover:border-primary-container/40 rounded-xl shadow-sm active:scale-[0.98] transition-all group">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center text-[14px] font-bold mr-3 mt-0.5">A</div>
                    <div class="flex-grow">
                        <p id="opt-a-text" class="text-[15px] text-on-surface-variant group-hover:text-on-surface leading-relaxed">选项 A</p>
                    </div>
                </button>
                
                <button onclick="selectOption('B')" class="w-full text-left flex items-start p-4 bg-surface-container-lowest border-2 border-outline-variant hover:border-primary-container/40 rounded-xl shadow-sm active:scale-[0.98] transition-all group">
                    <div class="flex-shrink-0 w-8 h-8 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center text-[14px] font-bold mr-3 mt-0.5">B</div>
                    <div class="flex-grow">
                        <p id="opt-b-text" class="text-[15px] text-on-surface-variant group-hover:text-on-surface leading-relaxed">选项 B</p>
                    </div>
                </button>
            </div>
        </div>

        <!-- View 3: Result -->
        <div id="view-result" class="flex flex-col h-full fade-enter hidden items-center text-center pt-8">
            <div id="result-icon-bg" class="w-20 h-20 rounded-full bg-secondary-container/50 flex items-center justify-center mb-6">
                <span id="result-icon" class="material-symbols-outlined text-[40px] text-primary">verified</span>
            </div>
            <h2 id="result-title" class="text-[24px] font-bold text-on-surface mb-3">档案校准完成</h2>
            <p id="result-desc" class="text-[15px] text-on-surface-variant leading-relaxed px-4 mb-8">
                你的答案和 INTJ 的认知模式高度一致。你的主导功能 Ni（内倾直觉）在你身上表现得很典型——我们接下来的对话会基于这个档案来帮你。
            </p>
            
            <div class="w-full space-y-3 mt-auto pt-8">
                <button id="btn-enter-chat" onclick="window.location.href='chat.html'" class="w-full h-14 bg-primary text-on-primary font-bold text-[16px] rounded-xl flex items-center justify-center shadow-lg active:scale-[0.98] transition-transform">
                    进入 AI 职场陪伴
                </button>
                <button id="btn-retake" onclick="window.location.href='assessment.html'" class="w-full h-14 bg-surface-container-low text-on-surface font-medium text-[16px] rounded-xl flex items-center justify-center active:scale-[0.98] transition-transform hidden">
                    重新做完整测评 (5分钟)
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { supabase } from './src/supabase.js';

        // Auth check
        const { data: { user } } = await supabase.auth.getUser();
        if (!user) window.location.href = 'login.html';

        // Data Models
        const mbtiTypes = [
            'INTJ', 'INTP', 'ENTJ', 'ENTP',
            'INFJ', 'INFP', 'ENFJ', 'ENFP',
            'ISTJ', 'ISFJ', 'ESTJ', 'ESFJ',
            'ISTP', 'ISFP', 'ESTP', 'ESFP'
        ];

        // Functions mapping based on theory
        const typeFunctions = {
            'INTJ': ['Ni', 'Te', 'Fi', 'Se'],
            'INFJ': ['Ni', 'Fe', 'Ti', 'Se'],
            'ISTJ': ['Si', 'Te', 'Fi', 'Ne'],
            'ISFJ': ['Si', 'Fe', 'Ti', 'Ne'],
            'ENTJ': ['Te', 'Ni', 'Se', 'Fi'],
            'ENFJ': ['Fe', 'Ni', 'Se', 'Ti'],
            'ESTJ': ['Te', 'Si', 'Ne', 'Fi'],
            'ESFJ': ['Fe', 'Si', 'Ne', 'Ti'],
            'INTP': ['Ti', 'Ne', 'Si', 'Fe'],
            'INFP': ['Fi', 'Ne', 'Si', 'Te'],
            'ISTP': ['Ti', 'Se', 'Ni', 'Fe'],
            'ISFP': ['Fi', 'Se', 'Ni', 'Te'],
            'ENTP': ['Ne', 'Ti', 'Fe', 'Si'],
            'ENFP': ['Ne', 'Fi', 'Te', 'Si'],
            'ESTP': ['Se', 'Ti', 'Fe', 'Ni'],
            'ESFP': ['Se', 'Fi', 'Te', 'Ni']
        };

        const questions = [
            {
                q: "你在处理一个复杂的职场难题，试图找到突破口。你的思维方式更接近哪个？",
                a: "脑子里会同时冒出很多\"这里可以这样试试、那里如果换个角度呢……\"的念头，方向越想越多，很难只锁定一个",
                b: "会安静地沉一沉，等某个方向在内心\"落定\"——那个感觉出现时，我会清楚知道\"就是这个\"，然后坚定走下去",
                funcA: "Ne", funcB: "Ni"
            },
            {
                q: "你的同事提交了一个方案，请你给意见。你最在意的是什么？",
                a: "这个方案的内部逻辑是否严密——我需要彻底理解它的底层机制，弄清楚它\"为什么成立\"，哪怕它实际效率不是最高",
                b: "这个方案能不能真正落地——执行路径清不清晰，能产生什么具体结果，推进起来有没有阻力",
                funcA: "Ti", funcB: "Te"
            },
            {
                q: "团队要做一个决定，但这个决定和你个人的判断有些出入。你的内心第一反应更接近？",
                a: "我先会想：这个决定对团队氛围和大家的感受会有什么影响——如果大家都能接受，我可以搁置自己的想法",
                b: "我先会在内心确认：这个决定和我认为\"对\"的是否一致——如果和我的判断相悖，我很难假装认可，即使没人发现",
                funcA: "Fe", funcB: "Fi"
            },
            {
                q: "公司突然宣布从下周起全面切换一套新的协作工具，你从未用过。你的第一反应更接近？",
                a: "先动手试一试——直接上手感受它是怎么运作的，在实际操作中摸清楚比提前研究更有效率",
                b: "先回想一下以前切换工具时踩过的坑、哪些习惯迁移得顺、哪些需要特别注意——用过去的经验来判断这次怎么做",
                funcA: "Se", funcB: "Si"
            },
            {
                q: "面对一个从未碰过的重要决策，你最信任的内部依据是什么？",
                a: "对\"这件事最终会走向哪里\"的整体直觉——我不太需要先例，我更依赖自己对走向和结果的预感",
                b: "过去经历过的相似情境——我会从自己的历史经验里找规律，来判断这次最稳妥的做法是什么",
                funcA: "Ni", funcB: "Si"
            }
        ];

        // App State
        let selectedType = null;
        let currentStep = 0; // 0: type selection, 1: q1... 5: q5, 6: result
        let currentQIndex = 0;
        let userFunctions = [];

        // DOM Elements
        const viewTypeSelection = document.getElementById('view-type-selection');
        const viewQuestion = document.getElementById('view-question');
        const viewResult = document.getElementById('view-result');
        const typeGrid = document.getElementById('type-grid');
        const btnStartCalibration = document.getElementById('btn-start-calibration');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const headerTitle = document.getElementById('header-title');

        // Initialize Type Grid
        function initTypeGrid() {
            typeGrid.innerHTML = '';
            mbtiTypes.forEach(type => {
                const btn = document.createElement('button');
                btn.className = 'type-btn h-12 bg-surface-container-lowest border border-outline-variant rounded-lg text-[14px] font-bold text-on-surface transition-all active:scale-95';
                btn.innerText = type;
                btn.onclick = () => selectType(type, btn);
                typeGrid.appendChild(btn);
            });
        }

        function selectType(type, btn) {
            selectedType = type;
            // Reset styles
            document.querySelectorAll('.type-btn').forEach(b => {
                b.classList.remove('border-primary', 'bg-secondary-container/20', 'text-primary');
                b.classList.add('border-outline-variant', 'bg-surface-container-lowest', 'text-on-surface');
            });
            // Apply active style
            btn.classList.remove('border-outline-variant', 'bg-surface-container-lowest', 'text-on-surface');
            btn.classList.add('border-primary', 'bg-secondary-container/20', 'text-primary');
            
            // Enable next button
            btnStartCalibration.disabled = false;
            btnStartCalibration.classList.remove('bg-surface-variant', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
            btnStartCalibration.classList.add('bg-primary', 'text-on-primary', 'shadow-md', 'hover:opacity-90');
            btnStartCalibration.onclick = startCalibration;
        }

        function switchView(hideView, showView) {
            hideView.classList.remove('fade-enter-active');
            setTimeout(() => {
                hideView.classList.add('hidden');
                showView.classList.remove('hidden');
                // trigger reflow
                void showView.offsetWidth;
                showView.classList.add('fade-enter-active');
            }, 300);
        }

        function startCalibration() {
            currentStep = 1;
            headerTitle.innerText = `认知功能校准`;
            progressContainer.classList.remove('hidden');
            switchView(viewTypeSelection, viewQuestion);
            renderQuestion();
        }

        function renderQuestion() {
            const q = questions[currentQIndex];
            document.getElementById('q-counter').innerText = `校准题 ${currentQIndex + 1} / 5`;
            document.getElementById('q-text').innerText = q.q;
            document.getElementById('opt-a-text').innerText = q.a;
            document.getElementById('opt-b-text').innerText = q.b;
            
            progressBar.style.width = `${((currentQIndex) / 5) * 100}%`;
        }

        function selectOption(opt) {
            const q = questions[currentQIndex];
            userFunctions.push(opt === 'A' ? q.funcA : q.funcB);
            
            if (currentQIndex < 4) {
                currentQIndex++;
                
                // Add small delay for button press visual feedback
                setTimeout(() => {
                    viewQuestion.classList.remove('fade-enter-active');
                    setTimeout(() => {
                        renderQuestion();
                        viewQuestion.classList.add('fade-enter-active');
                    }, 200);
                }, 150);
            } else {
                progressBar.style.width = '100%';
                setTimeout(() => {
                    showResult();
                }, 400);
            }
        }

        async function showResult() {
            progressContainer.classList.add('hidden');
            headerTitle.innerText = `校准结果`;

            // Calculate match count
            const expectedStack = typeFunctions[selectedType];
            let matchCount = 0;
            userFunctions.forEach(func => {
                if (expectedStack.includes(func)) matchCount++;
            });

            // Determine calibration result label
            let calibrationResult;
            if (matchCount >= 4) calibrationResult = 'consistent';
            else if (matchCount === 3) calibrationResult = 'deviation';
            else calibrationResult = 'mismatch';

            // Determine dominant function from calibration answers:
            // Count frequency of each function across all 5 answers,
            // then pick the most frequent one that also exists in the type's expected stack.
            // If no overlap, fallback to the theoretical dominant (stack[0]).
            const freqMap = {};
            userFunctions.forEach(fn => { freqMap[fn] = (freqMap[fn] || 0) + 1; });
            // Sort by frequency desc, then by position in expectedStack asc (for tie-breaking)
            const ranked = Object.entries(freqMap)
                .sort((a, b) => {
                    if (b[1] !== a[1]) return b[1] - a[1];
                    return expectedStack.indexOf(a[0]) - expectedStack.indexOf(b[0]);
                });
            // Pick highest-freq function that is in the type's stack; fallback to stack[0]
            let dominantFunction = expectedStack[0];
            for (const [fn] of ranked) {
                if (expectedStack.includes(fn)) { dominantFunction = fn; break; }
            }

            // Render UI
            const titleEl = document.getElementById('result-title');
            const descEl = document.getElementById('result-desc');
            const iconEl = document.getElementById('result-icon');
            const iconBgEl = document.getElementById('result-icon-bg');
            const btnRetake = document.getElementById('btn-retake');

            if (calibrationResult === 'consistent') {
                titleEl.innerText = "一致性确认";
                iconEl.innerText = "verified";
                iconEl.className = "material-symbols-outlined text-[40px] text-[#0D9488]";
                iconBgEl.className = "w-20 h-20 rounded-full bg-[#e0f7f5] flex items-center justify-center mb-6";
                descEl.innerText = `你的答案和 ${selectedType} 的认知模式高度一致。你的主导功能 ${dominantFunction} 在你身上表现得很典型——我们接下来的对话会基于这个档案来帮你。`;
            } else if (calibrationResult === 'deviation') {
                titleEl.innerText = "存在一定偏差";
                iconEl.innerText = "info";
                iconEl.className = "material-symbols-outlined text-[40px] text-[#bd5700]";
                iconBgEl.className = "w-20 h-20 rounded-full bg-[#ffdbc9] flex items-center justify-center mb-6";
                descEl.innerText = `你选择了 ${selectedType}，但你的部分答案偏向了其他功能。推断你的主导功能为 ${dominantFunction}，我会在档案中同时记录这个信息。`;
            } else {
                titleEl.innerText = "建议重新测评";
                iconEl.innerText = "warning";
                iconEl.className = "material-symbols-outlined text-[40px] text-[#ba1a1a]";
                iconBgEl.className = "w-20 h-20 rounded-full bg-[#ffdad6] flex items-center justify-center mb-6";
                descEl.innerText = `你的答案和 ${selectedType} 的功能模式在几个关键维度上有明显差异，建议做一次完整的 20 题职场测评来确认你的类型。`;
                btnRetake.classList.remove('hidden');
            }

            // Save calibration result to Supabase
            try {
                await supabase.from('user_profiles').upsert({
                    id: user.id,
                    mbti_type: selectedType,
                    dominant_function: dominantFunction,
                    calibration_result: calibrationResult,
                    calibration_answers: userFunctions,
                    assessment_source: 'calibration',
                    updated_at: new Date().toISOString()
                }, { onConflict: 'id' });
            } catch (e) {
                console.error('Calibration save error:', e);
            }

            switchView(viewQuestion, viewResult);
        }

        function goBack() {
            if (currentStep === 0) {
                window.location.href = 'index.html';
            } else if (currentStep === 1 && currentQIndex === 0) {
                if (hasProfileType) {
                    window.location.href = 'result.html';
                } else {
                    // Back to type selection
                    currentStep = 0;
                    progressContainer.classList.add('hidden');
                    headerTitle.innerText = `已知类型入驻`;
                    switchView(viewQuestion, viewTypeSelection);
                }
            } else if (currentStep === 1 && currentQIndex > 0) {
                // Back one question
                userFunctions.pop();
                currentQIndex--;
                viewQuestion.classList.remove('fade-enter-active');
                setTimeout(() => {
                    renderQuestion();
                    viewQuestion.classList.add('fade-enter-active');
                }, 200);
            } else {
                // From result, go to index or chat
                window.location.href = 'index.html';
            }
        }

        let hasProfileType = false;

        // Init
        async function init() {
            try {
                const { data: profile } = await supabase
                    .from('user_profiles')
                    .select('mbti_type')
                    .eq('id', user.id)
                    .single();
                
                if (profile && profile.mbti_type) {
                    hasProfileType = true;
                    selectedType = profile.mbti_type;
                    startCalibration();
                } else {
                    initTypeGrid();
                }
            } catch (e) {
                console.error(e);
                initTypeGrid();
            }
        }
        
        init();

        // Expose to global scope for inline onclick handlers
        window.goBack = goBack;
        window.selectOption = selectOption;
    </script>
</body>
</html>
