<p class="font-body-md text-body-md text-on-surface-variant">Design documentation for username registration validation.</p>
</header>
<!-- STATE 1: Default -->
<section class="flex flex-col gap-2 px-[20px]">
<label class="font-medium text-[17.3px] text-[#475569]">用户名</label>
<div class="input-container flex items-center bg-[#e8eeff] rounded-lg px-4 gap-3">
<span class="material-symbols-outlined text-[#475569]" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-lg text-body-lg placeholder-[#475569] text-[#1e2a4a]" placeholder="字母与数字组合，如 alex007" type="text">
</div>
<p class="text-[#475569] text-[14px] leading-tight">
                · 只允许英文字母和数字　· 4–20 个字符
            </p>
</section>
<!-- STATE 2: Error -->
<section class="flex flex-col gap-2 px-[20px]">
<label class="font-medium text-[17.3px] text-[#ffb4ab]">用户名</label>
<div class="input-container flex items-center bg-[#e8eeff] border border-[#ffb4ab] rounded-lg px-4 gap-3">
<span class="material-symbols-outlined text-[#475569]" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-lg text-body-lg text-[#1e2a4a]" type="text" value="alex_007!">
<span class="material-symbols-outlined text-[#ffb4ab]" data-icon="cancel" style="font-variation-settings: &quot;FILL&quot; 1;">cancel</span>
</div>
<p class="text-[#ffb4ab] text-[14px] leading-tight">
                用户名只能包含英文字母和数字，不支持特殊字符
            </p>
</section>
<!-- STATE 3: Valid -->
<section class="flex flex-col gap-2 px-[20px]">
<label class="font-medium text-[17.3px] text-[#0D9488]">用户名</label>
<div class="input-container flex items-center bg-[#e8eeff] border border-[#0D9488] rounded-lg px-4 gap-3">
<span class="material-symbols-outlined text-[#475569]" data-icon="person">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full p-0 font-body-lg text-body-lg text-[#1e2a4a]" type="text" value="alex007">
<span class="material-symbols-outlined text-[#0D9488]" data-icon="check_circle" style="font-variation-settings: &quot;FILL&quot; 1;">check_circle</span>
</div>
<p class="text-[#0D9488] text-[14px] leading-tight font-medium">
                用户名可用 ✓
            </p>
</section>

<script>
        // Micro-interaction for input fields
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('ring-2', 'ring-primary/20');
                input.parentElement.style.transition = 'all 0.2s ease';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('ring-2', 'ring-primary/20');
            });
        });
    </script>
