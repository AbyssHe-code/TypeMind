<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>职场人格 - 测评中心</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; min-height: max(884px, 100dvh); }
  .progress-bar-glow { box-shadow: 0 0 8px rgba(0,93,184,0.3); }
</style>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "surface-bright": "#f9f9ff", "background": "#f9f9ff", "surface": "#f9f9ff",
        "on-background": "#181c22", "on-surface": "#181c22", "on-surface-variant": "#414753",
        "surface-variant": "#e0e2eb", "surface-container": "#ebedf7",
        "surface-container-low": "#f1f3fc", "surface-container-lowest": "#ffffff",
        "surface-container-high": "#e6e8f1", "surface-container-highest": "#e0e2eb",
        "primary": "#005ab4", "primary-container": "#0a73e0",
        "on-primary": "#ffffff", "on-primary-container": "#fefcff",
        "secondary": "#465f88", "secondary-container": "#b6d0ff",
        "on-secondary-container": "#3f5881", "tertiary": "#964400",
        "outline": "#717785", "outline-variant": "#c1c6d5",
        "error": "#ba1a1a"
      },
      borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
      spacing: { "xs": "4px", "sm": "8px", "md": "16px", "lg": "24px", "xl": "32px", "margin": "24px", "gutter": "16px", "base": "8px" },
      fontSize: {
        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "600" }],
        "body-md": ["14px", { lineHeight: "20px", fontWeight: "400" }],
        "body-lg": ["16px", { lineHeight: "24px", fontWeight: "400" }],
        "label-md": ["12px", { lineHeight: "16px", letterSpacing: "0.5px", fontWeight: "500" }]
      }
    }}
  }
</script>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col selection:bg-secondary-container pb-32">

<!-- Loading State -->
<div id="loading-screen" class="fixed inset-0 bg-background flex flex-col items-center justify-center z-50">
  <div class="w-12 h-12 border-4 border-primary-container border-t-transparent rounded-full animate-spin mb-4"></div>
  <p class="text-on-surface-variant text-body-md">加载题目中…</p>
</div>

<!-- Top Area: Progress Bar -->
<div class="fixed top-0 left-0 w-full z-40 bg-background">
  <div class="w-full h-[2px] bg-outline-variant">
    <div id="progress-bar" class="h-full bg-primary-container progress-bar-glow transition-all duration-500 ease-out" style="width: 0%"></div>
  </div>
  <header class="flex justify-between items-center px-margin py-sm">
    <button aria-label="返回" id="back-btn" class="p-xs -ml-xs text-on-surface hover:bg-surface-container-high rounded-full transition-colors active:scale-90">
      <span class="material-symbols-outlined text-[24px]">chevron_left</span>
    </button>
    <span id="q-counter" class="font-label-md text-label-md text-on-surface-variant">第 1 题 / 20 题</span>
  </header>
</div>

<!-- Main Question Content Area -->
<main class="flex-grow flex flex-col justify-start px-margin pt-[120px] pb-[180px] overflow-y-auto">
  <!-- Category Badge -->
  <div class="mb-md">
    <span id="q-category" class="inline-flex items-center px-md py-xs rounded-full bg-secondary-container/30 border border-secondary-container text-primary font-label-md text-label-md">能量来源</span>
  </div>
  <!-- Question Text -->
  <div class="mb-xl">
    <h1 id="q-text" class="font-headline-md text-headline-md text-on-surface tracking-tight"></h1>
  </div>
  <!-- Answer Options -->
  <div class="space-y-md">
    <button id="opt-a-btn" class="w-full text-left flex items-start p-md bg-surface-container-lowest border-2 border-outline-variant hover:border-primary-container/40 rounded-lg shadow-sm active:scale-[0.98] transition-all group">
      <div id="opt-a-badge" class="flex-shrink-0 w-10 h-10 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-headline-md text-[18px] mr-md transition-colors">A</div>
      <div class="flex-grow pt-1">
        <p id="opt-a-text" class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-on-surface"></p>
      </div>
    </button>
    <button id="opt-b-btn" class="w-full text-left flex items-start p-md bg-surface-container-lowest border-2 border-outline-variant hover:border-primary-container/40 rounded-lg shadow-sm active:scale-[0.98] transition-all group">
      <div id="opt-b-badge" class="flex-shrink-0 w-10 h-10 rounded-full border-2 border-outline-variant text-on-surface-variant flex items-center justify-center font-headline-md text-[18px] mr-md transition-colors">B</div>
      <div class="flex-grow pt-1">
        <p id="opt-b-text" class="font-body-lg text-body-lg text-on-surface-variant group-hover:text-on-surface"></p>
      </div>
    </button>
  </div>
  <!-- Hint -->
  <p id="hint-msg" class="hidden mt-4 text-center text-label-md text-error">请先选择一个选项</p>
</main>

<!-- Bottom Action Area -->
<div class="fixed bottom-20 left-0 w-full p-margin bg-background/80 backdrop-blur-md z-40">
  <button id="next-btn" class="w-full h-14 bg-primary-container text-on-primary font-label-md text-[16px] font-bold rounded-lg shadow-lg shadow-primary-container/20 hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm">
    下一题
    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
  </button>
</div>

<div class="fixed top-0 right-0 -z-10 opacity-5 pointer-events-none">
  <div class="w-96 h-96 bg-primary-container rounded-full blur-[100px]"></div>
</div>

<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 bg-surface border-t border-outline-variant/30 flex justify-around items-center h-20 pb-safe px-4">
  <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg" href="index.html">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0;">home</span>
    <span class="font-label text-label-md mt-1">首页</span>
  </a>
  <a class="flex flex-col items-center justify-center text-primary font-medium hover:bg-surface-container-high transition-colors p-2 rounded-lg" href="assessment.html">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">assignment</span>
    <span class="font-label text-label-md mt-1">测评</span>
  </a>
  <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg" href="chat.html">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0;">psychology</span>
    <span class="font-label text-label-md mt-1">AI 助手</span>
  </a>
  <a class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-lg" href="profile.html">
    <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 0;">person</span>
    <span class="font-label text-label-md mt-1">个人</span>
  </a>
</nav>

<script type="module">
import { supabase } from './src/supabase.js';

const CATEGORY_LABELS = { 'E/I': '能量来源', 'S/N': '信息处理', 'T/F': '决策方式', 'J/P': '生活方式' };

let questions = [];
let answers = [];      // 'A' or 'B' for each question
let currentIndex = 0;

// ── Auth check ──────────────────────────────────────────
const { data: { user } } = await supabase.auth.getUser();
if (!user) { window.location.href = 'login.html'; }

// ── Load questions ───────────────────────────────────────
const { data, error } = await supabase
  .from('mbti_questions')
  .select('*')
  .order('id');

if (error || !data?.length) {
  alert('题目加载失败，请刷新重试');
} else {
  questions = data;
  answers = new Array(questions.length).fill(null);
  document.getElementById('loading-screen').classList.add('hidden');
  renderQuestion();
}

// ── Render current question ──────────────────────────────
function renderQuestion() {
  const q = questions[currentIndex];
  const pct = Math.round(((currentIndex) / questions.length) * 100);
  document.getElementById('progress-bar').style.width = `${pct}%`;
  document.getElementById('q-counter').textContent = `第 ${currentIndex + 1} 题 / ${questions.length} 题`;
  document.getElementById('q-category').textContent = CATEGORY_LABELS[q.category] || q.category;
  document.getElementById('q-text').textContent = q.question;
  document.getElementById('opt-a-text').textContent = q.option_a;
  document.getElementById('opt-b-text').textContent = q.option_b;
  document.getElementById('hint-msg').classList.add('hidden');

  const isLast = currentIndex === questions.length - 1;
  const btn = document.getElementById('next-btn');
  btn.innerHTML = isLast
    ? '完成测评 <span class="material-symbols-outlined text-[20px]">check_circle</span>'
    : '下一题 <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';

  applySelectionStyle(answers[currentIndex]);
}

// ── Option selection ──────────────────────────────────────
document.getElementById('opt-a-btn').addEventListener('click', () => {
  answers[currentIndex] = 'A';
  applySelectionStyle('A');
});

document.getElementById('opt-b-btn').addEventListener('click', () => {
  answers[currentIndex] = 'B';
  applySelectionStyle('B');
});

function applySelectionStyle(selected) {
  const configs = { A: ['opt-a-btn', 'opt-a-badge', 'opt-a-text'], B: ['opt-b-btn', 'opt-b-badge', 'opt-b-text'] };
  ['A', 'B'].forEach(o => {
    const [btnId, badgeId, textId] = configs[o];
    const btn = document.getElementById(btnId);
    const badge = document.getElementById(badgeId);
    const text = document.getElementById(textId);
    if (o === selected) {
      btn.classList.replace('border-outline-variant', 'border-primary-container');
      badge.classList.remove('border-outline-variant', 'text-on-surface-variant');
      badge.classList.add('bg-primary-container', 'text-on-primary', 'border-primary-container');
      text.classList.replace('text-on-surface-variant', 'text-on-surface');
    } else {
      btn.classList.remove('border-primary-container'); btn.classList.add('border-outline-variant');
      badge.classList.remove('bg-primary-container', 'text-on-primary', 'border-primary-container');
      badge.classList.add('border-outline-variant', 'text-on-surface-variant');
      text.classList.remove('text-on-surface'); text.classList.add('text-on-surface-variant');
    }
  });
}

// ── Back button ───────────────────────────────────────────
document.getElementById('back-btn').addEventListener('click', () => {
  if (currentIndex === 0) { window.history.back(); }
  else { currentIndex--; renderQuestion(); }
});

// ── Next / Submit ─────────────────────────────────────────
document.getElementById('next-btn').addEventListener('click', async () => {
  if (!answers[currentIndex]) {
    document.getElementById('hint-msg').classList.remove('hidden');
    return;
  }
  if (currentIndex < questions.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    await submitAssessment();
  }
});

// ── Calculate MBTI & save ─────────────────────────────────
async function submitAssessment() {
  const btn = document.getElementById('next-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';

  // Count scores
  const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  questions.forEach((q, i) => {
    const picked = answers[i] === 'A' ? q.dim_a : q.dim_b;
    scores[picked]++;
  });

  const mbti_type =
    (scores.E >= scores.I ? 'E' : 'I') +
    (scores.S >= scores.N ? 'S' : 'N') +
    (scores.T >= scores.F ? 'T' : 'F') +
    (scores.J >= scores.P ? 'J' : 'P');

  const mbti_scores = {
    EI: { E: scores.E, I: scores.I },
    SN: { S: scores.S, N: scores.N },
    TF: { T: scores.T, F: scores.F },
    JP: { J: scores.J, P: scores.P }
  };

  // UPSERT to user_profiles (clear calibration fields)
  const { error } = await supabase.from('user_profiles').upsert({
    id: user.id,
    mbti_type,
    mbti_scores,
    dominant_function: null,
    calibration_result: null,
    calibration_answers: null,
    assessment_source: '20q',
    updated_at: new Date().toISOString()
  }, { onConflict: 'id' });

  if (error) {
    alert('保存失败，请检查网络后重试');
    btn.disabled = false;
    renderQuestion();
    return;
  }

  document.getElementById('progress-bar').style.width = '100%';
  window.location.href = 'result.html';
}
</script>
</body></html>
