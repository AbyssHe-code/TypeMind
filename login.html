<body class="flex items-center justify-center min-h-screen bg-slate-100">
<!-- iPhone 14 Pro Frame Simulation for Preview -->
<div class="iphone-container bg-white shadow-2xl">
<!-- Status Bar Simulator -->
<div class="flex justify-between items-center px-8 pt-4 pb-2 w-full">
<span class="text-[15px] font-semibold text-black">9:41</span>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined !text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined !text-[18px]">wifi</span>
<span class="material-symbols-outlined !text-[20px]">battery_full</span>
</div>
</div>
<!-- TOP AREA: 72pt from top safe area -->
<div class="flex flex-col items-center pt-[72pt] px-margin">
<!-- 8-pointed star logo -->
<div class="w-[48pt] h-[48pt] flex items-center justify-center text-typemind-blue">
<span class="material-symbols-outlined !text-[48pt]" style="font-variation-settings: 'FILL' 1;">
                    emergency
                </span>
</div>
<h1 class="mt-4 text-typemind-navy font-semibold text-[26pt] leading-tight">TypeMind</h1>
<p class="mt-1 text-typemind-gray font-normal text-[14pt]">读懂自己，读懂职场</p>
</div>
<!-- FORM AREA -->
<div class="mt-12 px-margin flex-grow">
<h2 class="text-typemind-navy font-medium text-[22pt] mb-6">登录</h2>
<form id="login-form">
<div class="space-y-4">
<!-- Username Input -->
<div class="relative flex items-center">
<div class="absolute left-4 text-typemind-gray">
<span class="material-symbols-outlined">person</span>
</div>
<input id="username" class="w-full h-[52pt] pl-12 pr-4 bg-typemind-input rounded-iphone border-none placeholder:text-typemind-gray/60 text-typemind-navy text-[16px]" placeholder="用户名" type="text" required/>
</div>
<!-- Password Input -->
<div class="relative flex flex-col gap-2">
<div class="relative flex items-center">
<div class="absolute left-4 text-typemind-gray">
<span class="material-symbols-outlined">lock</span>
</div>
<input class="w-full h-[52pt] pl-12 pr-12 bg-typemind-input rounded-iphone border-none placeholder:text-typemind-gray/60 text-typemind-navy text-[16px]" id="password-input" placeholder="密码" type="password" required/>
<button class="absolute right-4 text-typemind-gray hover:opacity-70 transition-opacity" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" id="eye-icon">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end">
<a class="text-typemind-blue text-[13pt] font-normal transition-opacity hover:opacity-80" href="#">忘记密码？</a>
</div>
</div>
</div>
<!-- PRIMARY BUTTON -->
<button class="w-full h-[52pt] mt-8 bg-typemind-blue rounded-iphone flex items-center justify-center transition-all active:scale-[0.98]" type="submit" id="login-btn">
<span class="text-white font-semibold text-[17pt]">登录</span>
</button>
<p id="error-message" class="text-error text-center mt-4 hidden text-[14px]"></p>
</form>
<!-- DIVIDER -->
<div class="relative flex py-8 items-center">
<div class="flex-grow border-t border-[#c5d3f0]"></div>
<span class="flex-shrink mx-4 text-typemind-gray text-[13pt]">或</span>
<div class="flex-grow border-t border-[#c5d3f0]"></div>
</div>
<!-- REGISTER LINK -->
<div class="text-center text-[15pt]">
<span class="text-typemind-gray">还没有账号？</span>
<a class="text-typemind-blue font-medium ml-1 transition-opacity hover:opacity-80" href="register.html">立即注册</a>
</div>
</div>
<!-- Home Indicator Simulator -->
<div class="flex justify-center pb-2">
<div class="w-32 h-1.5 bg-black/20 rounded-full"></div>
</div>
</div>
<script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }
    </script>
    <script type="module">
        import { supabase } from './src/supabase.js';

        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password-input');
        const errorMsg = document.getElementById('error-message');
        const loginBtn = document.getElementById('login-btn');
        const btnText = loginBtn.querySelector('span');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            // UI 状态更新
            loginBtn.disabled = true;
            btnText.innerText = '登录中...';
            errorMsg.classList.add('hidden');

            try {
                let email = username;
                if (!username.includes('@')) {
                    email = `${username}@example.com`;
                }
                    
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // 登录成功，跳转到首页
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('Login error:', error);
                // 简化错误提示
                let msg = error.message;
                if (msg.includes('Invalid login credentials')) {
                    msg = '用户名或密码错误';
                }
                showError(msg);
            } finally {
                loginBtn.disabled = false;
                btnText.innerText = '登录';
            }
        });

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }
    </script>
</body></html>
