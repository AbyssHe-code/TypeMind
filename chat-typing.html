<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ios-keyboard {
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(20px);
        }
        .key {
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 1px 0 rgba(0,0,0,0.3);
        }
        .key-active {
            background: rgba(255, 255, 255, 0.3);
        }
        .dot-pulse {
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
        }
        .dot-1 { animation-delay: 0s; }
        .dot-2 { animation-delay: 0.3s; }
        .dot-3 { animation-delay: 0.6s; }
        
        .ai-avatar-gradient {
            background: linear-gradient(135deg, #005ab4 0%, #0a73e0 100%);
        }
        
        /* Smooth transition for keyboard appearance simulation */
        .chat-container {
            height: calc(100vh - 380px); /* Height adjusted for keyboard + input area */
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#f9f9ff",
                        "on-primary": "#ffffff",
                        "surface-container": "#ebedf7",
                        "secondary-container": "#b6d0ff",
                        "inverse-surface": "#2d3037",
                        "on-tertiary-fixed-variant": "#763400",
                        "background": "#f9f9ff",
                        "on-surface-variant": "#414753",
                        "on-secondary-fixed-variant": "#2d476f",
                        "on-background": "#181c22",
                        "surface-variant": "#e0e2eb",
                        "surface-container-low": "#f1f3fc",
                        "on-primary-fixed-variant": "#00458d",
                        "on-error": "#ffffff",
                        "secondary-fixed-dim": "#aec7f7",
                        "secondary-fixed": "#d6e3ff",
                        "on-surface": "#181c22",
                        "surface-container-highest": "#e0e2eb",
                        "surface": "#f9f9ff",
                        "on-secondary": "#ffffff",
                        "primary": "#005ab4",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed": "#321200",
                        "tertiary-fixed": "#ffdbc9",
                        "on-primary-fixed": "#001b3e",
                        "primary-fixed-dim": "#aac7ff",
                        "inverse-primary": "#aac7ff",
                        "surface-tint": "#005db8",
                        "surface-dim": "#d7dae3",
                        "surface-container-high": "#e6e8f1",
                        "primary-fixed": "#d6e3ff",
                        "on-secondary-container": "#3f5881",
                        "error": "#ba1a1a",
                        "tertiary-fixed-dim": "#ffb68c",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed": "#001b3d",
                        "outline-variant": "#c1c6d5",
                        "outline": "#717785",
                        "tertiary": "#964400",
                        "primary-container": "#0a73e0",
                        "on-tertiary-container": "#fffbff",
                        "secondary": "#465f88",
                        "on-error-container": "#93000a",
                        "on-primary-container": "#fefcff",
                        "tertiary-container": "#bd5700",
                        "inverse-on-surface": "#eef0fa",
                        "surface-container-lowest": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "md": "16px",
                        "margin": "24px",
                        "xl": "32px",
                        "base": "8px",
                        "sm": "8px",
                        "xs": "4px",
                        "lg": "24px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.5px", "fontWeight": "500"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background flex flex-col h-screen overflow-hidden">
<!-- Top App Bar -->
<header class="flex justify-between items-center px-margin h-14 w-full bg-background sticky top-0 z-50">
<div class="flex items-center gap-2">
<button class="transition-opacity duration-200 hover:opacity-80">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">AI 助手</h1>
</div>
<div class="flex items-center gap-4">
<button class="transition-opacity duration-200 hover:opacity-80">
<span class="material-symbols-outlined text-on-surface-variant">history</span>
</button>
<button class="transition-opacity duration-200 hover:opacity-80">
<span class="material-symbols-outlined text-on-surface-variant">more_vert</span>
</button>
</div>
</header>
<!-- Chat Canvas -->
<main class="flex-1 overflow-y-auto px-margin py-lg chat-container flex flex-col gap-lg">
<!-- AI Message -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-7 h-7 ai-avatar-gradient rounded-full flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[18px] text-white">psychology</span>
</div>
<div class="bg-surface-container-high rounded-xl rounded-tl-none p-lg shadow-sm border border-outline-variant/30">
<p class="font-body-md text-body-md text-on-surface">你好！我是你的职场 AI 助手。基于你的「挑战者型」人格特征，我发现你在团队沟通中更倾向于直接表达观点。今天遇到了什么沟通难题吗？</p>
</div>
</div>
<!-- User Message -->
<div class="flex items-start justify-end gap-3 self-end max-w-[85%]">
<div class="bg-primary text-on-primary rounded-xl rounded-tr-none p-lg shadow-md">
<p class="font-body-md text-body-md">是的，我确实感觉表达得比较直接，但总觉得同事不理解我的初衷。</p>
</div>
<div class="w-7 h-7 bg-surface-variant rounded-full flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[18px] text-primary">person</span>
</div>
</div>
<!-- AI Typing Indicator -->
<div class="flex items-start gap-3 max-w-[85%]">
<div class="w-7 h-7 ai-avatar-gradient rounded-full flex items-center justify-center shrink-0 shadow-lg">
<span class="material-symbols-outlined text-[18px] text-white">psychology</span>
</div>
<div class="bg-inverse-surface rounded-xl rounded-tl-none px-lg py-sm flex items-center gap-3">
<span class="font-label-md text-label-md text-white/80">AI 正在输入</span>
<div class="flex gap-1 items-center h-full">
<span class="w-1.5 h-1.5 bg-white/60 rounded-full dot-pulse dot-1"></span>
<span class="w-1.5 h-1.5 bg-white/60 rounded-full dot-pulse dot-2"></span>
<span class="w-1.5 h-1.5 bg-white/60 rounded-full dot-pulse dot-3"></span>
</div>
</div>
</div>
</main>
<!-- Input Area (Active State) -->
<section class="bg-surface-container border-t border-outline-variant/20 p-md flex flex-col gap-md">
<div class="flex items-end gap-md">
<button class="mb-1 transition-opacity hover:opacity-70">
<span class="material-symbols-outlined text-on-surface-variant">add_circle</span>
</button>
<div class="flex-1 bg-surface-container-lowest border-2 border-[#2665fd] rounded-xl px-lg py-sm min-h-[44px] shadow-sm">
<p class="font-body-md text-body-md text-on-surface leading-tight">我和我的同事小王在这个项目里总是谈不拢，他每次开会都...</p>
</div>
<button class="w-11 h-11 bg-primary text-on-primary rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</section>
<!-- Simulated iOS Dark Keyboard -->
<section class="ios-keyboard w-full h-[300px] flex flex-col p-2 gap-2 select-none">
<!-- Row 1 -->
<div class="flex justify-between w-full h-11 gap-1.5">
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">Q</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">W</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">E</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">R</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">T</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">Y</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">U</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">I</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">O</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">P</div>
</div>
<!-- Row 2 -->
<div class="flex justify-between w-full h-11 gap-1.5 px-4">
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">A</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">S</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">D</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">F</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">G</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">H</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">J</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">K</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">L</div>
</div>
<!-- Row 3 -->
<div class="flex justify-between w-full h-11 gap-1.5">
<div class="key-active w-[14%] rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">shift</span>
</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">Z</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">X</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">C</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">V</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">B</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">N</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-lg font-medium">M</div>
<div class="key-active w-[14%] rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">backspace</span>
</div>
</div>
<!-- Row 4 -->
<div class="flex justify-between w-full h-11 gap-1.5">
<div class="key w-[14%] rounded-lg flex items-center justify-center text-white text-sm font-medium">123</div>
<div class="key w-[12%] rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">mood</span>
</div>
<div class="key flex-1 rounded-lg flex items-center justify-center text-white text-sm font-medium">空格</div>
<div class="key w-[22%] bg-blue-600 rounded-lg flex items-center justify-center text-white text-sm font-bold">换行</div>
</div>
<!-- Bottom Bar -->
<div class="flex justify-center w-full mt-4">
<div class="w-32 h-1 bg-white/40 rounded-full"></div>
</div>
</section>
<script>
        // Micro-interaction for typing simulation
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.chat-container');
            container.scrollTop = container.scrollHeight;
        });
    </script>
</body></html>
